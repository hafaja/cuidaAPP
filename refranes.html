<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refranes que Estimulan · CuidarConSentido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF6EF;
    --paper-alt:#F2EADC;
    --ink:#2B241D;
    --ink-soft:#5C5347;
    --line:#E1D6C4;
    --teal:#1F5C5C;        /* Memoria */
    --ochre:#C08A28;       /* Atención */
    --terracotta:#A8553C;  /* Lenguaje */
    --plum:#6B4C7A;        /* Función ejecutiva */
    --sage:#5F7F52;        /* Vida social */
    --indigo:#2E4C6D;      /* Sabiduría */
    --gold:#C08A28;
    --ok:#3E7A4C;
    --bad:#B4483A;
    --radius:16px;
    --shadow:0 4px 14px rgba(43,36,29,0.08);
    --shadow-lg:0 12px 34px rgba(43,36,29,0.14);
    --font-display:'Fraunces', serif;
    --font-body:'Public Sans', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:
      radial-gradient(1200px 600px at 90% -10%, rgba(192,138,40,0.10), transparent 60%),
      radial-gradient(1000px 500px at -10% 10%, rgba(31,92,92,0.08), transparent 55%),
      var(--paper);
    color:var(--ink);
    font-size:18px;
    line-height:1.55;
    padding-bottom:60px;
  }
  a{color:inherit;}
  .wrap{max-width:920px;margin:0 auto;padding:0 20px;}

  /* ---------- HEADER ---------- */
  header.top{
    position:relative;
    padding:34px 0 26px;
    border-bottom:1px solid var(--line);
    overflow:hidden;
  }
  .thread{
    position:absolute; left:0; right:0; bottom:-1px; height:60px;
    pointer-events:none;
  }
  .eyebrow{
    font-family:var(--font-body);
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:12.5px;
    color:var(--terracotta);
    margin:0 0 10px;
  }
  h1.title{
    font-family:var(--font-display);
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(30px,6vw,44px);
    margin:0 0 10px;
    color:var(--ink);
  }
  .subtitle{
    font-size:16.5px;
    color:var(--ink-soft);
    max-width:56ch;
    margin:0 0 20px;
  }
  .lang-toggle{
    display:inline-flex;
    background:var(--paper-alt);
    border:1px solid var(--line);
    border-radius:999px;
    padding:4px;
    gap:4px;
  }
  .lang-toggle button{
    border:none; background:transparent;
    font-family:var(--font-body); font-weight:700; font-size:14px;
    padding:9px 16px; border-radius:999px; cursor:pointer;
    color:var(--ink-soft);
    transition:background .18s, color .18s;
  }
  .lang-toggle button.active{
    background:var(--ink);
    color:var(--paper);
  }

  /* ---------- PROVERB OF THE DAY ---------- */
  .pod{
    margin:26px 0 6px;
    background:linear-gradient(135deg, var(--indigo), #1c3450);
    color:#F6F1E6;
    border-radius:var(--radius);
    padding:24px 26px;
    box-shadow:var(--shadow-lg);
    position:relative;
    overflow:hidden;
  }
  .pod::after{
    content:"";
    position:absolute; right:-40px; top:-40px; width:160px; height:160px;
    border-radius:50%;
    background:rgba(192,138,40,0.25);
  }
  .pod-label{
    font-size:12px; font-weight:800; letter-spacing:.14em; text-transform:uppercase;
    color:#E8C77A; margin-bottom:8px; position:relative;
  }
  .pod-text{
    font-family:var(--font-display); font-weight:500; font-size:22px;
    margin:0 0 14px; position:relative; max-width:60ch;
  }
  .pod-btn{
    position:relative;
    border:1px solid rgba(246,241,230,0.5);
    background:rgba(246,241,230,0.08);
    color:#F6F1E6; font-family:var(--font-body); font-weight:700; font-size:14px;
    padding:10px 18px; border-radius:999px; cursor:pointer;
  }
  .pod-btn:hover{background:rgba(246,241,230,0.18);}

  /* ---------- PROGRESS ---------- */
  .progress-wrap{
    margin:22px 0 8px;
    display:flex; align-items:center; gap:14px;
    font-size:14px; color:var(--ink-soft); font-weight:600;
  }
  .progress-track{
    flex:1; height:8px; border-radius:999px; background:var(--paper-alt);
    border:1px solid var(--line); overflow:hidden;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg, var(--sage), var(--teal));
    width:0%; transition:width .4s ease;
  }

  /* ---------- FILTERS ---------- */
  .filters{
    display:flex; flex-wrap:wrap; gap:8px;
    margin:22px 0 26px;
  }
  .chip{
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    font-family:var(--font-body); font-weight:700; font-size:13.5px;
    padding:8px 14px; border-radius:999px; cursor:pointer;
    display:flex; align-items:center; gap:7px;
    transition:all .15s;
  }
  .chip .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .chip.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  .chip.active .dot{outline:2px solid rgba(255,255,255,.5);}

  /* ---------- GRID ---------- */
  .grid{display:grid; grid-template-columns:1fr; gap:14px;}
  @media(min-width:680px){ .grid{grid-template-columns:1fr 1fr;} }

  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-left:6px solid var(--teal);
    border-radius:14px;
    padding:18px 18px 16px;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform .15s, box-shadow .15s;
  }
  .card:hover{transform:translateY(-2px); box-shadow:var(--shadow-lg);}
  .card.done{opacity:.72;}
  .card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px;}
  .domain-tag{
    font-size:11.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    padding:4px 9px; border-radius:999px; color:#fff; white-space:nowrap;
  }
  .check{
    width:22px;height:22px;border-radius:50%;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex:none;
    font-size:13px; color:transparent; font-weight:900;
  }
  .card.done .check{background:var(--ok); border-color:var(--ok); color:#fff;}
  .card-text{
    font-family:var(--font-display); font-size:19px; font-weight:500;
    margin:2px 0 10px; color:var(--ink);
  }
  .activity-hint{
    font-size:13px; color:var(--ink-soft); font-weight:600;
    display:flex; align-items:center; gap:6px;
  }

  /* ---------- ACTIVITY PANEL (expanded) ---------- */
  .panel{
    margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);
  }
  .panel h4{
    margin:0 0 10px; font-family:var(--font-body); font-size:13px;
    text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
  }
  .options{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
  .opt-btn{
    border:1.5px solid var(--line); background:#fff; color:var(--ink);
    font-family:var(--font-body); font-weight:700; font-size:15px;
    padding:9px 15px; border-radius:10px; cursor:pointer;
  }
  .opt-btn.correct{background:var(--ok); border-color:var(--ok); color:#fff;}
  .opt-btn.wrong{background:var(--bad); border-color:var(--bad); color:#fff;}
  .opt-btn[disabled]{cursor:default;}
  .word-bank, .word-slot{display:flex; flex-wrap:wrap; gap:8px;}
  .word-slot{min-height:44px; padding:8px; background:var(--paper-alt); border:1.5px dashed var(--line); border-radius:10px; margin-bottom:10px;}
  .word-chip{
    border:1.5px solid var(--line); background:#fff; color:var(--ink);
    font-family:var(--font-body); font-weight:600; font-size:15px;
    padding:8px 13px; border-radius:8px; cursor:pointer;
  }
  .word-chip.used{opacity:.35; pointer-events:none;}
  .mirror-grid{display:grid; grid-template-columns:1fr; gap:8px; margin-bottom:12px;}
  @media(min-width:520px){.mirror-grid{grid-template-columns:1fr 1fr;}}
  .mirror-item{
    background:var(--paper-alt); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; font-family:var(--font-display); font-size:16px;
  }
  .mirror-item .lg{font-size:11px; font-weight:800; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em; display:block; margin-bottom:3px; font-family:var(--font-body);}
  textarea.memo{
    width:100%; min-height:80px; border:1.5px solid var(--line); border-radius:10px;
    padding:10px 12px; font-family:var(--font-body); font-size:15px; resize:vertical;
    background:#fff; color:var(--ink);
  }
  .prompt-text{font-size:15.5px; color:var(--ink); margin-bottom:12px;}
  .row-btns{display:flex; flex-wrap:wrap; gap:10px; margin-top:6px;}
  .btn{
    border:none; font-family:var(--font-body); font-weight:700; font-size:14.5px;
    padding:10px 16px; border-radius:10px; cursor:pointer;
  }
  .btn-primary{background:var(--ink); color:var(--paper);}
  .btn-ghost{background:var(--paper-alt); color:var(--ink); border:1px solid var(--line);}
  .feedback{font-size:14.5px; font-weight:700; margin-top:8px;}
  .feedback.ok{color:var(--ok);}
  .feedback.bad{color:var(--bad);}

  footer{
    margin-top:40px; text-align:center; font-size:13px; color:var(--ink-soft);
  }
  .sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0);}

  @media (prefers-reduced-motion: reduce){
    .card, .progress-fill{transition:none;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="wrap">
    <p class="eyebrow" data-i="eyebrow">Estimulación cognitiva</p>
    <h1 class="title" data-i="title">Refranes que Estimulan</h1>
    <p class="subtitle" data-i="subtitle">Un hilo de sabiduría entre generaciones: cada refrán trae consigo una pequeña actividad para la mente.</p>
    <div class="lang-toggle" role="group" aria-label="Idioma">
      <button data-lang="es" class="active">ES</button>
      <button data-lang="fr">FR</button>
      <button data-lang="ca">CA</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
  <svg class="thread" viewBox="0 0 920 60" preserveAspectRatio="none" aria-hidden="true">
    <path d="M0,30 C 150,60 300,0 460,30 C 620,60 770,0 920,30" fill="none" stroke="#C08A28" stroke-width="2" opacity="0.35"/>
  </svg>
</header>

<div class="wrap">

  <div class="pod" id="pod">
    <div class="pod-label" data-i="podLabel">Refrán del día</div>
    <p class="pod-text" id="podText">—</p>
    <button class="pod-btn" id="podBtn" data-i="podBtn">Ver actividad</button>
  </div>

  <div class="progress-wrap">
    <span data-i="progressLabel">Refranes trabajados</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <span id="progressCount">0/14</span>
  </div>

  <div class="filters" id="filters"></div>

  <div class="grid" id="grid"></div>

  <footer data-i="footer">CuidarConSentido · Estimulación cognitiva a través de la tradición oral</footer>
</div>

 texts:{es:'Cría cuervos y te sacarán los ojos.',fr:'Nourris un corbeau, il te crèvera l\'œil.',ca:'Cria corbs i et trauran els ulls.',en:'No good deed goes unpunished.'},
 words:{
   es:['Cría','cuervos','y','te','sacarán','los','ojos.'],
   fr:['Nourris','un','corbeau,','il','te','crèvera','l\'œil.'],
   ca:['Cria','corbs','i','et','trauran','els','ulls.'],
   en:['No','good','deed','goes','unpunished.']
 }},
{id:13, domain:'SOC', activity:'espejo',
 texts:{es:'De tal palo, tal astilla.',fr:'Tel père, tel fils.',ca:'De tal fusta, tal estella.',en:'Like father, like son.'}},
{id:14, domain:'WIS', activity:'familia',
 texts:{es:'La experiencia es la madre de la ciencia.',fr:'L\'expérience est la mère de la science.',ca:'L\'experiència és la mare de la ciència.',en:'Experience is the best teacher.'},
 prompt:{es:'Pide a la persona mayor de la casa que cuente una lección de vida aprendida con los años. Anotadla juntos.',
         fr:'Demande à la personne la plus âgée de la maison de raconter une leçon de vie apprise au fil des ans. Notez-la ensemble.',
         ca:'Demana a la persona més gran de la casa que expliqui una lliçó de vida apresa amb els anys. Anoteu-la junts.',
         en:'Ask the eldest person at home to share a life lesson learned over the years. Write it down together.'}}
];

/* ============ STATE ============ */
let currentLang = 'es';
let activeFilter = null;
let expandedId = null;
let progress = JSON.parse(localStorage.getItem('refranes_progress')||'[]');
let ordenarState = {}; // id -> {slots:[], bank:[]}
let memoText = JSON.parse(localStorage.getItem('refranes_memorias')||'{}');

function t(key){ return (UI[key] && UI[key][currentLang]) || UI[key]?.es || ''; }
function saveProgress(){ localStorage.setItem('refranes_progress', JSON.stringify(progress)); }
function saveMemo(){ localStorage.setItem('refranes_memorias', JSON.stringify(memoText)); }
function markDone(id){ if(!progress.includes(id)){ progress.push(id); saveProgress(); } }

/* ============ RENDER: STATIC UI STRINGS ============ */
function renderUIStrings(){
  document.querySelectorAll('[data-i]').forEach(el=>{
    el.textContent = t(el.getAttribute('data-i'));
  });
  document.querySelectorAll('.lang-toggle button').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===currentLang);
  });
}

/* ============ PROVERB OF THE DAY ============ */
function renderPOD(){
  const dayIndex = Math.floor(Date.now()/86400000) % PROVERBS.length;
  const p = PROVERBS[dayIndex];
  document.getElementById('podText').textContent = p.texts[currentLang];
  document.getElementById('podBtn').onclick = ()=>{
    activeFilter = null;
    renderFilters();
    expandedId = p.id;
    renderGrid();
    document.getElementById('card-'+p.id)?.scrollIntoView({behavior:'smooth', block:'center'});
  };
}

/* ============ FILTERS ============ */
function renderFilters(){
  const wrap = document.getElementById('filters');
  wrap.innerHTML='';
  const allBtn = document.createElement('button');
  allBtn.className = 'chip' + (activeFilter===null?' active':'');
  allBtn.innerHTML = `<span>${ {es:'Todos',fr:'Tous',ca:'Tots',en:'All'}[currentLang] }</span>`;
  allBtn.onclick = ()=>{ activeFilter=null; renderFilters(); renderGrid(); };
  wrap.appendChild(allBtn);
  Object.keys(DOMAINS).forEach(key=>{
    const d = DOMAINS[key];
    const btn = document.createElement('button');
    btn.className = 'chip' + (activeFilter===key?' active':'');
    btn.innerHTML = `<span class="dot" style="background:${d.color}"></span><span>${d.labels[currentLang]}</span>`;
    btn.onclick = ()=>{ activeFilter = (activeFilter===key? null : key); renderFilters(); renderGrid(); };
    wrap.appendChild(btn);
  });
}

/* ============ PROGRESS BAR ============ */
function renderProgress(){
  const pct = Math.round((progress.length/PROVERBS.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressCount').textContent = progress.length+'/'+PROVERBS.length;
}

/* ============ ACTIVITY BUILDERS ============ */
function buildCompletar(p, container){
  const b = p.blank[currentLang];
  const stem = document.createElement('p');
  stem.className='card-text';
  stem.style.marginTop='0';
  stem.textContent = b.template;
  container.appendChild(stem);

  const optsWrap = document.createElement('div');
  optsWrap.className='options';
  const shuffled = [...b.options].sort(()=>Math.random()-0.5);
  shuffled.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='opt-btn';
    btn.textContent = opt;
    btn.onclick = ()=>{
      const isCorrect = opt === b.correct;
      optsWrap.querySelectorAll('.opt-btn').forEach(x=>x.disabled=true);
      btn.classList.add(isCorrect?'correct':'wrong');
      const fb = document.createElement('div');
      fb.className='feedback ' + (isCorrect?'ok':'bad');
      fb.textContent = isCorrect ? t('correctMsg') : t('wrongMsg');
      container.appendChild(fb);
      if(isCorrect){ markDone(p.id); renderProgress(); renderGrid(); }
      else{
        setTimeout(()=>{ optsWrap.querySelectorAll('.opt-btn').forEach(x=>{x.disabled=false; x.classList.remove('wrong');}); fb.remove(); }, 900);
      }
    };
    optsWrap.appendChild(btn);
  });
  container.appendChild(optsWrap);
}

function buildOrdenar(p, container){
  if(!ordenarState[p.id]){
    const words = [...p.words[currentLang]];
    ordenarState[p.id] = { correct: p.words[currentLang], bank: [...words].sort(()=>Math.random()-0.5), slots: [] };
  }
  const state = ordenarState[p.id];
  const slot = document.createElement('div');
  slot.className='word-slot';
  const bank = document.createElement('div');
  bank.className='word-bank';

  function renderChips(){
    slot.innerHTML=''; bank.innerHTML='';
    state.slots.forEach((w,i)=>{
      const c=document.createElement('button');
      c.className='word-chip'; c.textContent=w;
      c.onclick=()=>{ state.slots.splice(i,1); renderChips(); };
      slot.appendChild(c);
    });
    state.bank.forEach((w,i)=>{
      const c=document.createElement('button');
      c.className='word-chip'; c.textContent=w;
      c.onclick=()=>{ state.slots.push(w); state.bank.splice(i,1); renderChips(); checkOrdenar(); };
      bank.appendChild(c);
    });
  }
  function checkOrdenar(){
    if(state.bank.length===0){
      const isCorrect = state.slots.join(' ') === state.correct.join(' ');
      const fb = document.createElement('div');
      fb.className='feedback ' + (isCorrect?'ok':'bad');
      fb.textContent = isCorrect ? t('correctMsg') : t('wrongMsg');
      container.appendChild(fb);
      if(isCorrect){ markDone(p.id); renderProgress(); setTimeout(renderGrid, 700); }
      else{
        setTimeout(()=>{
          state.bank = [...state.slots].sort(()=>Math.random()-0.5);
          state.slots = [];
          fb.remove();
          renderChips();
        }, 1000);
      }
    }
  }
  renderChips();
  container.appendChild(document.createTextNode(''));
  container.appendChild(slot);
  container.appendChild(bank);

  const resetBtn = document.createElement('button');
  resetBtn.className='btn btn-ghost';
  resetBtn.textContent = t('resetBtn');
  resetBtn.style.marginTop='10px';
  resetBtn.onclick = ()=>{ delete ordenarState[p.id]; renderGrid(); };
  container.appendChild(resetBtn);
}

function buildEspejo(p, container){
  const q = document.createElement('p');
  q.className='prompt-text';
  q.textContent = t('mirrorQuestion');
  container.appendChild(q);
  const grid = document.createElement('div');
  grid.className='mirror-grid';
  LANGS.forEach(l=>{
    const item = document.createElement('div');
    item.className='mirror-item';
    item.innerHTML = `<span class="lg">${LANGNAME[l]}</span>${p.texts[l]}`;
    grid.appendChild(item);
  });
  container.appendChild(grid);
  const doneBtn = document.createElement('button');
  doneBtn.className='btn btn-primary';
  doneBtn.textContent = t('markDoneBtn');
  doneBtn.onclick = ()=>{ markDone(p.id); renderProgress(); renderGrid(); };
  container.appendChild(doneBtn);
}

function buildFamilia(p, container){
  const q = document.createElement('p');
  q.className='prompt-text';
  q.textContent = p.prompt[currentLang];
  container.appendChild(q);
  const row = document.createElement('div');
  row.className='row-btns';
  const shareBtn = document.createElement('button');
  shareBtn.className='btn btn-ghost';
  shareBtn.textContent = t('shareBtn');
  shareBtn.onclick = async ()=>{
    const text = p.texts[currentLang] + '\n\n' + p.prompt[currentLang];
    if(navigator.share){ try{ await navigator.share({text}); }catch(e){} }
    else { try{ await navigator.clipboard.writeText(text); shareBtn.textContent = {es:'¡Copiado!',fr:'Copié !',ca:'Copiat!',en:'Copied!'}[currentLang]; }catch(e){} }
  };
  const doneBtn = document.createElement('button');
  doneBtn.className='btn btn-primary';
  doneBtn.textContent = t('markDoneBtn');
  doneBtn.onclick = ()=>{ markDone(p.id); renderProgress(); renderGrid(); };
  row.appendChild(shareBtn); row.appendChild(doneBtn);
  container.appendChild(row);
}

function buildMemoria(p, container){
  const q = document.createElement('p');
  q.className='prompt-text';
  q.textContent = p.prompt[currentLang];
  container.appendChild(q);
  const ta = document.createElement('textarea');
  ta.className='memo';
  ta.placeholder = {es:'Escribe aquí…',fr:'Écris ici…',ca:'Escriu aquí…',en:'Write here…'}[currentLang];
  ta.value = memoText[p.id] || '';
  container.appendChild(ta);
  const row = document.createElement('div');
  row.className='row-btns';
  const saveBtn = document.createElement('button');
  saveBtn.className='btn btn-primary';
  saveBtn.textContent = t('saveBtn');
  saveBtn.onclick = ()=>{
    memoText[p.id] = ta.value;
    saveMemo();
    markDone(p.id);
    renderProgress();
    const fb = document.createElement('div');
    fb.className='feedback ok';
    fb.textContent = t('savedMsg');
    container.appendChild(fb);
    setTimeout(renderGrid, 900);
  };
  row.appendChild(saveBtn);
  container.appendChild(row);
}

/* ============ CARD + GRID ============ */
function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML='';
  const list = PROVERBS.filter(p => activeFilter===null || p.domain===activeFilter);

  list.forEach(p=>{
    const d = DOMAINS[p.domain];
    const card = document.createElement('div');
    card.className = 'card' + (progress.includes(p.id)?' done':'');
    card.id = 'card-'+p.id;
    card.style.borderLeftColor = d.color;

    const top = document.createElement('div');
    top.className='card-top';
    const tag = document.createElement('span');
    tag.className='domain-tag';
    tag.style.background = d.color;
    tag.textContent = d.labels[currentLang];
    const check = document.createElement('span');
    check.className='check';
    check.textContent = '✓';
    top.appendChild(tag); top.appendChild(check);
    card.appendChild(top);

    const text = document.createElement('p');
    text.className='card-text';
    text.textContent = p.texts[currentLang];
    card.appendChild(text);

    const hint = document.createElement('div');
    hint.className='activity-hint';
    hint.textContent = '✏️ ' + UI.activityLabel[p.activity][currentLang];
    card.appendChild(hint);

    card.addEventListener('click', (e)=>{
      if(e.target.closest('.panel')) return;
      expandedId = (expandedId===p.id) ? null : p.id;
      renderGrid();
    });

    if(expandedId===p.id){
      const panel = document.createElement('div');
      panel.className='panel';
      panel.addEventListener('click', e=>e.stopPropagation());
      const h4 = document.createElement('h4');
      h4.textContent = UI.activityLabel[p.activity][currentLang];
      panel.appendChild(h4);
      if(p.activity==='completar') buildCompletar(p, panel);
      else if(p.activity==='ordenar') buildOrdenar(p, panel);
      else if(p.activity==='espejo') buildEspejo(p, panel);
      else if(p.activity==='familia') buildFamilia(p, panel);
      else if(p.activity==='memoria') buildMemoria(p, panel);
      card.appendChild(panel);
    }

    grid.appendChild(card);
  });

  if(progress.length === PROVERBS.length){
    const pod = document.getElementById('pod');
    if(!document.getElementById('allDoneMsg')){
      const msg = document.createElement('p');
      msg.id='allDoneMsg';
      msg.style.cssText='position:relative;margin:10px 0 0;font-size:14px;color:#E8C77A;font-weight:700;';
      msg.textContent = t('allDone');
      pod.appendChild(msg);
    }
  }
}

/* ============ LANG SWITCH ============ */
document.querySelectorAll('.lang-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentLang = btn.dataset.lang;
    ordenarState = {}; // reset in-progress ordering when language changes
    renderUIStrings();
    renderPOD();
    renderFilters();
    renderGrid();
  });
});

/* ============ INIT ============ */
renderUIStrings();
renderPOD();
renderFilters();
renderProgress();
renderGrid();
</script>
</body>
</html>
